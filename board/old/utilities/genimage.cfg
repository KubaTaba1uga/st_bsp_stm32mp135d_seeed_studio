image sdcard.img {
	name = "sd-card"
	hdimage {
		partition-table-type = "gpt"
	}

	partition fsbl1 {
		image = "tf-a-stm32mp135d-odyssey_dev_minimal_dt-mx.stm32"
		offset = 1M
		size = 1M
	}

	partition fsbl2 {
		image = "tf-a-stm32mp135d-odyssey_dev_minimal_dt-mx.stm32"
		size = 1M
	}

	partition fip {
		image = "fip.bin"
		size = 4M
	}

	partition u-boot-env {
		size = 2M
	}

}

image emmc.img {
	name = "eMMC"
	hdimage {
		partition-table-type = "gpt"
	}

	partition u-boot-env {
		offset = 1M
		size = 2M
	}
}

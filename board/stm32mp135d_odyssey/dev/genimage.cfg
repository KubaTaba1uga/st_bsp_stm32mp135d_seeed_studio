image sdcard.img {
	name = "sd-card"
	hdimage {
		partition-table-type = "gpt"
	}

	partition fsbl1 {
		image = "tf-a-stm32mp135d-odyssey-mx.stm32"
		offset = 1M
		size = 256K
	}

	partition fsbl2 {
		image = "tf-a-stm32mp135d-odyssey-mx.stm32"
		size = 256K
	}

	partition fip {
		image = "fip.bin"
		size = 4M
	}

	partition boot {
		bootable = "yes"
		image = "boot.ext2"
	}

	partition rootfs {
		bootable = "yes"	
		image = "rootfs.ext2"
		partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"   # Linux filesystem
		partition-uuid = "69DAD710-2CE4-4E3C-B16C-21A1D49ABED3"
	}
}

name: Build

on:
  push:
    branches: [add_release_build]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: debian:trixie

    env:
      FORCE_UNSAFE_CONFIGURE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          apt update
          apt install -y python3-invoke sudo git
          # inv install

      # - name: Build
      #   run: inv build-bsp

      - name: Prepare release files
        run: |
          mkdir -p release
          touch release/sdcard.img
          touch release/buildroot.config
          # cp build/buildroot/images/sdcard.img release/sdcard.img
          # cp build/buildroot/.config release/buildroot.config

      - name: Publish latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest CI artifacts
          body: Automatically generated from branch add_release_build
          prerelease: true
          files: |
            release/sdcard.img
            release/buildroot.config


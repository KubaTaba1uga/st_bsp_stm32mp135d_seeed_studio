# .github/workflows/doxygen-pages.yml
name: Doxygen Pages

on:
  push:
    branches: [host_docs_on_github]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Doxygen
        run:
          sudo apt-get update && sudo apt-get install -y doxygen graphviz python3 python3-venv python3-pip && \
          venv .venv && .venv/bin/pip install invoke myst-parser==5.0.0 sphinx==8.2.3 breathe==4.36.0 sphinx_rtd_theme==3.0.2 sphinx-autobuild==2025.08.25
      - name: Prepare directories
        run: mkdir -p build/doxygen
      - name: Build docs
        run: doxygen docs/Doxyfile
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
